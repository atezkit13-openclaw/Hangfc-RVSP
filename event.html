<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出席登記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#fafafa; --surface:#ffffff; --surface2:#f5f5f5;
  --border:#efefef; --border2:#dbdbdb;
  --text:#111111; --sub:#737373; --sub2:#a8a8a8;
  --green:#22c55e; --green-bg:#f0fdf4; --green-border:#bbf7d0;
  --blue:#3b82f6; --blue-bg:#eff6ff;
  --orange:#f97316; --orange-bg:#fff7ed;
  --red:#ef4444; --red-bg:#fef2f2;
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Manrope','Noto Sans HK',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding-bottom:100px;}

/* TOP NAV */
.topnav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;padding:8px 0;}
.nav-title{font-size:15px;font-weight:800;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-right{width:60px;text-align:right;}

/* EVENT BANNER */
.ev-banner{position:relative;height:200px;overflow:hidden;}
.ev-banner-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);}
.ev-banner-grid{position:absolute;inset:0;opacity:0.07;background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:36px 36px;}
.ev-banner-content{position:relative;z-index:1;padding:20px 20px 16px;height:100%;display:flex;flex-direction:column;justify-content:flex-end;}
.ev-status-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;margin-bottom:10px;width:fit-content;}
.ev-status-badge.open{background:rgba(34,197,94,0.2);color:#4ade80;}
.ev-status-badge.full{background:rgba(249,115,22,0.2);color:#fb923c;}
.ev-status-badge.past{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);}
.ev-banner-title{font-size:26px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:6px;}
.ev-banner-date{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;}
.ev-shirt{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.3);}

/* META PILLS ROW */
.meta-row{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;}
.meta-row::-webkit-scrollbar{display:none;}
.meta-pill{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--sub);background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:5px 11px;}

/* NOTES */
.ev-notes{margin:12px 16px 0;background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;font-weight:500;color:#92400e;}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:10;}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--sub2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none;}
.tab.active{color:var(--text);border-bottom-color:var(--text);}

.panel{display:none;padding:20px 16px;}
.panel.active{display:block;}

/* ALERTS */
.alert{border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert.reserve{background:var(--blue-bg);border:1px solid #bfdbfe;color:var(--blue);}
.alert.past-notice{background:var(--surface2);border:1px solid var(--border2);color:var(--sub);display:block;text-align:center;}

/* RSVP BUTTONS */
.slabel{font-size:11px;font-weight:700;color:var(--sub2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;}
.rsvp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.rsvp-btn{padding:14px 6px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--surface2);color:var(--sub);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;user-select:none;}
.rsvp-btn .ri{font-size:24px;display:block;margin-bottom:4px;}
.rsvp-btn.going.sel{border-color:var(--green);background:var(--green-bg);color:#16a34a;}
.rsvp-btn.maybe.sel{border-color:var(--orange);background:var(--orange-bg);color:var(--orange);}
.rsvp-btn.no.sel   {border-color:var(--red);  background:var(--red-bg);  color:var(--red);}

/* FIELD */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;color:var(--text);font-family:'Manrope','Noto Sans HK',sans-serif;font-size:15px;font-weight:500;outline:none;-webkit-appearance:none;width:100%;transition:border-color .15s;}
.field input:focus,.field textarea:focus{border-color:var(--text);background:var(--surface);}

/* POSITION PILLS */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.pill{padding:8px 15px;border-radius:100px;border:1.5px solid var(--border2);background:var(--surface);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;}
.pill.sel{border-color:var(--text);background:var(--text);color:#fff;}

.submit-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--text);color:#fff;font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s;letter-spacing:0.3px;}
.submit-btn:active{opacity:0.85;}
.submit-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* ROSTER */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px 6px;text-align:center;}
.stat-num{font-size:26px;font-weight:800;line-height:1;}
.stat-num.g{color:var(--green);} .stat-num.r{color:var(--blue);} .stat-num.m{color:var(--orange);} .stat-num.x{color:var(--red);}
.stat-lbl{font-size:10px;font-weight:700;color:var(--sub2);margin-top:3px;letter-spacing:0.5px;}

.cap-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
.cap-top{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:10px;}
.cap-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.cap-fill{height:100%;border-radius:4px;transition:width .5s;}
.cap-fill.low{background:var(--green);} .cap-fill.mid{background:var(--orange);} .cap-fill.hi{background:var(--red);}

/* PLAYER CARDS */
.plist{display:flex;flex-direction:column;gap:6px;}
.glabel{font-size:11px;font-weight:700;color:var(--sub2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.glabel::after{content:'';flex:1;height:1px;background:var(--border2);}
.reserve-divider{border:none;border-top:2px dashed var(--border2);margin:6px 0 10px;}

.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:10px;transition:background .1s;}
.pcard.rv{border-color:#bfdbfe;background:#f0f7ff;}
.pnum{font-size:16px;font-weight:800;width:28px;text-align:center;flex-shrink:0;color:var(--sub2);}
.pnum.mn{color:var(--green);} .pnum.rv{color:var(--blue);font-size:12px;}
.pavatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:700;color:var(--text);}
.pmeta{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px;}
.pright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sdot.g{background:var(--green);} .sdot.r{background:var(--blue);} .sdot.m{background:var(--orange);} .sdot.x{background:var(--red);}
.ptag{font-size:10px;font-weight:600;color:var(--sub2);background:var(--surface2);padding:2px 7px;border-radius:6px;white-space:nowrap;}

.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.empty .ei{font-size:48px;margin-bottom:12px;}
.empty p{font-size:13px;font-weight:500;}

.loading{display:flex;align-items:center;justify-content:center;padding:80px;color:var(--sub);font-size:13px;gap:10px;}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 22px;border-radius:100px;font-size:13px;font-weight:700;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,0.15);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
.toast.info{background:var(--blue);}
</style>
</head>
<body>
<div class="wrap" id="mainWrap">
  <div class="loading"><div class="spin"></div> 載入賽事...</div>
</div>
<div class="toast" id="toast"></div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAyLmh84JDr5ddjOnYYqgcJsupHJaZ-kig",
  authDomain: "hangfc-rvsp.firebaseapp.com",
  projectId: "hangfc-rvsp",
  storageBucket: "hangfc-rvsp.appspot.com",
  messagingSenderId: "477710217351",
  appId: "1:477710217351:web:20badc5d8f88aa34404822"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var params = new URLSearchParams(location.search);
var eventId = params.get('id');
if (!eventId) { location.href='index.html'; }

var eventData=null, players=[], curStatus=null, curPos='';
var DAYS=['日','一','二','三','四','五','六'];
var MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var AVATAR_COLORS=['#f43f5e','#8b5cf6','#3b82f6','#10b981','#f59e0b','#06b6d4','#ec4899','#14b8a6'];

db.collection('events').doc(eventId).onSnapshot(function(snap){
  if(!snap.exists){location.href='index.html';return;}
  eventData=Object.assign({id:snap.id},snap.data());
  if(document.getElementById('mainWrap').querySelector('.loading')) buildPage();
});

db.collection('events').doc(eventId).collection('registrations')
  .orderBy('ts','asc').onSnapshot(function(snap){
    players=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(document.getElementById('panel-roster')){renderRoster();updateCapBar();}
  });

function buildPage() {
  var ev=eventData, cap=ev.capacity||14;
  var today=toDateStr(new Date()), isPast=ev.date<today;
  var parts=ev.date.split('-'), yr=parts[0], mm=parseInt(parts[1]), dd=parts[2];
  var dayName=DAYS[new Date(ev.date+'T00:00:00').getDay()];
  var statusCls=isPast?'past':ev.mainCount>=cap?'full':'open';
  var statusTxt=isPast?'已完場':ev.mainCount>=cap?'爆滿 🔥':'報名中 ✅';
  document.title=(ev.title||'賽事')+' — 恆友 FC';

  document.getElementById('mainWrap').innerHTML=
    // Top nav
    '<div class="topnav">'
    +'<div class="back-btn" onclick="history.back()">‹ 返回</div>'
    +'<div class="nav-title">'+esc(ev.title||'友賽')+'</div>'
    +'<div class="nav-right"></div>'
    +'</div>'

    // Banner
    +'<div class="ev-banner">'
    +'<div class="ev-banner-bg"></div>'
    +'<div class="ev-banner-grid"></div>'
    +(ev.shirtColor?'<div class="ev-shirt" style="background:'+ev.shirtColor+'"></div>':'')
    +'<div class="ev-banner-content">'
    +'<span class="ev-status-badge '+statusCls+'">'+statusTxt+'</span>'
    +'<div class="ev-banner-title">'+esc(ev.title||'友賽')+'</div>'
    +'<div class="ev-banner-date">'+yr+'年 '+MONTHS[mm-1]+' '+dd+'日（'+dayName+'）</div>'
    +'</div></div>'

    // Meta pills
    +'<div class="meta-row">'
    +(ev.timeStart?'<div class="meta-pill">⏰ '+ev.timeStart+(ev.timeEnd?' – '+ev.timeEnd:'')+'</div>':'')
    +(ev.venue?'<div class="meta-pill">📍 '+esc(ev.venue)+'</div>':'')
    +(ev.opponent?'<div class="meta-pill">🆚 '+esc(ev.opponent)+'</div>':'')
    +(ev.fee?'<div class="meta-pill">💰 '+esc(ev.fee)+'</div>':'')
    +'</div>'
    +(ev.notes?'<div class="ev-notes">📝 '+esc(ev.notes)+'</div>':'')

    // Tabs
    +'<div class="tabs">'
    +'<div class="tab active" id="tab-rsvp" onclick="switchTab(\'rsvp\')">⚽ 出席登記</div>'
    +'<div class="tab" id="tab-roster" onclick="switchTab(\'roster\')">👥 名單</div>'
    +'</div>'

    // RSVP panel
    +'<div class="panel active" id="panel-rsvp">'
    +(isPast?'<div class="alert past-notice">⏰ 此賽事已完場，登記已關閉</div>':'')
    +'<div class="alert reserve" id="capAlert">ℹ️ 正選名額已滿，將自動排入後備</div>'
    +'<p class="slabel">你會出席嗎？</p>'
    +'<div class="rsvp-row">'
    +'<div class="rsvp-btn going" onclick="selStatus(\'going\',this)"><span class="ri">✅</span>出席</div>'
    +'<div class="rsvp-btn maybe" onclick="selStatus(\'maybe\',this)"><span class="ri">🤔</span>未確定</div>'
    +'<div class="rsvp-btn no"    onclick="selStatus(\'no\',this)"><span class="ri">❌</span>不出席</div>'
    +'</div>'
    +'<div class="field"><label>你的名字 / Nickname</label>'
    +'<input type="text" id="playerName" placeholder="e.g. 阿恆 / Andy" maxlength="20" autocomplete="off"></div>'
    +'<p class="slabel">位置</p>'
    +'<div class="pills" id="posPills">'
    +'<div class="pill" onclick="selPill(this)">GK 門將</div>'
    +'<div class="pill" onclick="selPill(this)">DEF 後衛</div>'
    +'<div class="pill" onclick="selPill(this)">MID 中場</div>'
    +'<div class="pill" onclick="selPill(this)">FWD 前鋒</div>'
    +'<div class="pill" onclick="selPill(this)">任意</div>'
    +'</div>'
    +'<div class="field" id="reasonWrap" style="display:none"><label>缺席原因（可選）</label>'
    +'<textarea id="reason" rows="2" placeholder="有事、旅行、受傷..."></textarea></div>'
    +'<button class="submit-btn" id="submitBtn" onclick="submitRSVP()"'+(isPast?' disabled':'')+'>確認登記</button>'
    +'</div>'

    // Roster panel
    +'<div class="panel" id="panel-roster">'
    +'<div class="stats-row">'
    +'<div class="stat-box"><div class="stat-num g" id="cG">0</div><div class="stat-lbl">正選</div></div>'
    +'<div class="stat-box"><div class="stat-num r" id="cR">0</div><div class="stat-lbl">後備</div></div>'
    +'<div class="stat-box"><div class="stat-num m" id="cM">0</div><div class="stat-lbl">未定</div></div>'
    +'<div class="stat-box"><div class="stat-num x" id="cX">0</div><div class="stat-lbl">缺席</div></div>'
    +'</div>'
    +'<div class="cap-box"><div class="cap-top"><span>正選容量</span><span id="capText">0/'+cap+' 人</span></div>'
    +'<div class="cap-track"><div class="cap-fill low" id="capBar" style="width:0%"></div></div></div>'
    +'<div id="rosterList"><div class="empty"><div class="ei">👟</div><p>等緊隊友登記中...</p></div></div>'
    +'</div>';
}

function switchTab(n) {
  ['rsvp','roster'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===n);
    document.getElementById('panel-'+t).classList.toggle('active',t===n);
  });
  if(n==='roster') renderRoster();
}

function selStatus(s,el) {
  curStatus=s;
  document.querySelectorAll('.rsvp-btn').forEach(function(b){b.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('reasonWrap').style.display=s==='no'?'block':'none';
  var mc=annotate().filter(function(p){return p.slot==='main';}).length;
  var cap=eventData?eventData.capacity||14:14;
  var a=document.getElementById('capAlert');
  if(a) a.classList.toggle('show',s==='going'&&mc>=cap);
}

function selPill(el) {
  document.querySelectorAll('#posPills .pill').forEach(function(p){p.classList.remove('sel');});
  el.classList.add('sel'); curPos=el.textContent;
}

function submitRSVP() {
  var name=document.getElementById('playerName').value.trim();
  if(!name)      {toast('請輸入你的名字 👆','err');return;}
  if(!curStatus) {toast('請選擇出席狀態 👆','err');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='登記中...';
  var status=curStatus==='no'?'notgoing':curStatus;
  var cap=eventData?eventData.capacity||14:14;
  var nowTs=Date.now();
  var dts=new Date(nowTs).toLocaleString('zh-HK',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  var existing=players.find(function(p){return p.name.toLowerCase()===name.toLowerCase();});
  var data={name:name,status:status,pos:curPos||'任意',
    reason:(document.getElementById('reason')?document.getElementById('reason').value.trim():''),
    ts:existing?existing.ts:nowTs, dts:existing?existing.dts:dts, color:rndColor(name)};
  var promise=existing
    ? db.collection('events').doc(eventId).collection('registrations').doc(existing.id).set(data)
    : db.collection('events').doc(eventId).collection('registrations').add(data);
  promise.then(function(){
    var mc=annotate(players.concat([data])).filter(function(p){return p.slot==='main';}).length;
    db.collection('events').doc(eventId).update({mainCount:mc});
    if(existing) toast('登記已更新 ✅');
    else if(status==='going'&&annotate().filter(function(p){return p.slot==='main';}).length>=cap) toast('已加入後備名單','info');
    else if(status==='going') toast('登記成功！場見 🎉');
    else if(status==='maybe') toast('已加入未定名單');
    else toast('已記錄你不能出席');
    setTimeout(function(){switchTab('roster');},900);
  }).catch(function(err){toast('登記失敗: '+err.message,'err');})
  .finally(function(){btn.disabled=false;btn.textContent='確認登記';});
}

function annotate(list) {
  list=list||players;
  var cap=eventData?eventData.capacity||14:14;
  var sorted=[].concat(list).sort(function(a,b){return a.ts-b.ts;});
  var mn=0,rv=0;
  return sorted.map(function(p){
    if(p.status==='going'){
      if(mn<cap){mn++;return Object.assign({},p,{slot:'main',seq:mn});}
      else{rv++;return Object.assign({},p,{slot:'reserve',seq:rv});}
    }
    return Object.assign({},p,{slot:p.status,seq:null});
  });
}

function renderRoster() {
  var ann=annotate(), cap=eventData?eventData.capacity||14:14;
  var main=ann.filter(function(p){return p.slot==='main';});
  var reserve=ann.filter(function(p){return p.slot==='reserve';});
  var maybe=ann.filter(function(p){return p.status==='maybe';});
  var no=ann.filter(function(p){return p.status==='notgoing';});
  if(document.getElementById('cG')){
    document.getElementById('cG').textContent=main.length;
    document.getElementById('cR').textContent=reserve.length;
    document.getElementById('cM').textContent=maybe.length;
    document.getElementById('cX').textContent=no.length;
  }
  updateCapBar();
  var el=document.getElementById('rosterList');
  if(!el) return;
  if(!players.length){el.innerHTML='<div class="empty"><div class="ei">👟</div><p>等緊隊友登記中...</p></div>';return;}
  var h='<div class="plist">';
  if(main.length){h+='<div class="glabel">✅ 正選出席 ('+main.length+'/'+cap+')</div>';h+=main.map(function(p){return pCard(p,'main');}).join('');}
  if(reserve.length){h+='<hr class="reserve-divider"><div class="glabel" style="color:#3b82f6">🔵 後備名單 ('+reserve.length+')</div>';h+=reserve.map(function(p){return pCard(p,'reserve');}).join('');}
  if(maybe.length){h+='<div class="glabel">🤔 未確定 ('+maybe.length+')</div>';h+=maybe.map(function(p){return pCard(p,'maybe');}).join('');}
  if(no.length){h+='<div class="glabel">❌ 不出席 ('+no.length+')</div>';h+=no.map(function(p){return pCard(p,'notgoing');}).join('');}
  h+='</div>';
  el.innerHTML=h;
}

function updateCapBar() {
  var cap=eventData?eventData.capacity||14:14;
  var mc=annotate().filter(function(p){return p.slot==='main';}).length;
  var pct=Math.min(mc/cap*100,100);
  var bar=document.getElementById('capBar'),txt=document.getElementById('capText');
  if(bar){bar.style.width=pct+'%';bar.className='cap-fill '+(pct>=90?'hi':pct>=60?'mid':'low');}
  if(txt) txt.textContent=mc+'/'+cap+' 人';
}

function pCard(p,slot) {
  var ini=p.name.charAt(0).toUpperCase();
  var col=p.color||rndColor(p.name);
  var num=slot==='main'?'<div class="pnum mn">'+p.seq+'</div>'
         :slot==='reserve'?'<div class="pnum rv">R'+p.seq+'</div>'
         :'<div class="pnum">—</div>';
  var dot=slot==='main'?'g':slot==='reserve'?'r':p.status==='maybe'?'m':'x';
  return '<div class="pcard'+(slot==='reserve'?' rv':'')+'">'
    +num
    +'<div class="pavatar" style="background:'+col+'18;color:'+col+'">'+ini+'</div>'
    +'<div class="pinfo"><div class="pname">'+esc(p.name)+'</div>'
    +'<div class="pmeta">'+esc(p.pos||'')+(p.reason?' · '+esc(p.reason):'')+'</div></div>'
    +'<div class="pright"><div class="sdot '+dot+'"></div><div class="ptag">'+(p.dts||'')+'</div></div>'
    +'</div>';
}

function toDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rndColor(s){var c=['#f43f5e','#8b5cf6','#3b82f6','#10b981','#f59e0b','#06b6d4','#ec4899','#14b8a6'];var h=0;for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return c[Math.abs(h)%c.length];}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
</script>
