<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ 恆友 FC — 賽程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#f5c518; --dark:#0d1117; --card:#161b22; --card2:#1c2330;
  --border:rgba(255,255,255,0.08); --text:#e6edf3; --muted:#8b949e;
  --going:#2ea043; --reserve:#1d6fa4; --notgoing:#da3633;
  --pitch-green:#1a3a1f;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans HK',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 56px,rgba(255,255,255,0.012) 56px,rgba(255,255,255,0.012) 112px);pointer-events:none;z-index:0;}
.wrap{max-width:480px;margin:0 auto;padding:0 0 80px;position:relative;z-index:1;}

/* HERO */
.hero{background:linear-gradient(160deg,var(--pitch-green) 0%,#0d1117 65%);padding:28px 20px 20px;border-bottom:3px solid var(--accent);position:relative;overflow:hidden;}
.hero::after{content:'⚽';position:absolute;right:-20px;top:-15px;font-size:130px;opacity:0.05;transform:rotate(20deg);pointer-events:none;}
.hrow{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e6a800);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(245,197,24,0.35);flex-shrink:0;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;}
.team-sub{font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.mgr-btn{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.mgr-btn.active{border-color:var(--accent);color:var(--accent);}

/* CALENDAR NAV */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
.nav-arr{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:border-color .2s;}
.nav-arr:active{border-color:var(--accent);}

/* CALENDAR GRID */
.cal-wrap{padding:0 14px 10px;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.dh{text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:4px 0;}
.dh.sun{color:#f06962;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:default;font-size:13px;font-weight:500;transition:all .15s;}
.cal-day.empty{opacity:0;}
.cal-day.today{background:rgba(245,197,24,0.12);border:1.5px solid rgba(245,197,24,0.4);color:var(--accent);}
.cal-day.today .dn{color:var(--accent);}
.cal-day.has-event{cursor:pointer;background:rgba(46,160,67,0.12);border:1.5px solid rgba(46,160,67,0.35);}
.cal-day.has-event:active{transform:scale(0.95);}
.cal-day.has-event .dn{color:#4caf70;}
.cal-day.past{opacity:0.4;}
.dn{font-size:13px;font-weight:600;line-height:1;}
.event-dot{width:5px;height:5px;border-radius:50%;background:var(--going);margin-top:3px;box-shadow:0 0 4px var(--going);}
.sun-col{color:#8b949e;}
.cal-day.has-event.sun-col .dn,.sun-col.today .dn{color:inherit;}

/* UPCOMING EVENTS */
.section-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 20px;margin-bottom:10px;}
.events-list{display:flex;flex-direction:column;gap:10px;padding:0 14px;}

.event-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--going);border-radius:4px 0 0 4px;}
.event-card:active{transform:scale(0.98);}
.event-card.past::before{background:var(--muted);}
.event-card.full::before{background:var(--accent);}

.ec-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.ec-date-block{display:flex;flex-direction:column;}
.ec-day{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--accent);}
.ec-month{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.ec-status-badge{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:500;}
.ec-status-badge.open{background:rgba(46,160,67,0.15);color:#4caf70;border:1px solid rgba(46,160,67,0.3);}
.ec-status-badge.full{background:rgba(245,197,24,0.15);color:var(--accent);border:1px solid rgba(245,197,24,0.3);}
.ec-status-badge.past{background:rgba(139,148,158,0.12);color:var(--muted);border:1px solid var(--border);}

.ec-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.ec-details{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted);}
.ec-detail{display:flex;align-items:center;gap:4px;}

.ec-footer{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ec-slots{font-size:12px;color:var(--muted);}
.ec-slot-bar{height:4px;background:var(--border);border-radius:2px;flex:1;margin:0 10px;overflow:hidden;}
.ec-slot-fill{height:100%;background:var(--going);border-radius:2px;transition:width .4s;}
.ec-slot-fill.nearly{background:var(--accent);}
.ec-slot-fill.full{background:var(--notgoing);}
.ec-arrow{color:var(--accent);font-size:16px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .ei{font-size:48px;margin-bottom:12px;}

/* ── PIN MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1.2,.64,1);}
.modal-bg.show .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}

/* PIN INPUT */
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pdot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .2s;}
.pdot.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(245,197,24,0.5);}
.pdot.err{background:var(--notgoing);border-color:var(--notgoing);animation:shk .35s;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto;}
.pkey{padding:18px;border-radius:14px;border:1.5px solid var(--border);background:var(--card2);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:22px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.pkey:active{transform:scale(0.92);background:rgba(245,197,24,0.12);border-color:var(--accent);}
.pkey.del{font-family:'Noto Sans HK',sans-serif;font-size:15px;color:var(--muted);}
.pin-err{font-size:13px;color:#f06962;text-align:center;margin-top:14px;min-height:20px;}

/* ── CREATE EVENT MODAL ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12px;color:var(--muted);letter-spacing:0.5px;}
.field input,.field textarea,.field select{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'Noto Sans HK',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.submit-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#e6a800);color:#000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 20px rgba(245,197,24,0.3);-webkit-tap-highlight-color:transparent;}
.submit-btn:active{transform:scale(0.97);}
.modal-scroll{max-height:75vh;overflow-y:auto;padding-right:2px;}

/* SHIRT COLOR PICKER */
.color-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.color-opt.sel{border-color:#fff;transform:scale(1.15);box-shadow:0 0 8px rgba(255,255,255,0.3);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--going);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--notgoing);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e6a800);border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(245,197,24,0.4);z-index:40;display:none;-webkit-tap-highlight-color:transparent;transition:transform .15s;}
.fab:active{transform:scale(0.93);}
.fab.visible{display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hrow">
      <div class="brand">
        <div class="logo">⚽</div>
        <div>
          <div class="team-name" id="teamLabel">恆友 FC</div>
          <div class="team-sub">Football Schedule</div>
        </div>
      </div>
      <button class="mgr-btn" id="mgrToggle" onclick="openPinModal()">⚙️ 管理員</button>
    </div>
  </div>

  <!-- CALENDAR NAV -->
  <div class="cal-nav">
    <button class="nav-arr" onclick="shiftMonth(-1)">‹</button>
    <div class="cal-month" id="calTitle">2025年 3月</div>
    <button class="nav-arr" onclick="shiftMonth(1)">›</button>
  </div>

  <!-- CALENDAR GRID -->
  <div class="cal-wrap">
    <div class="day-headers">
      <div class="dh sun">日</div><div class="dh">一</div><div class="dh">二</div>
      <div class="dh">三</div><div class="dh">四</div><div class="dh">五</div><div class="dh">六</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- EVENTS LIST -->
  <p class="section-title" id="listTitle">本月賽程</p>
  <div class="events-list" id="eventsList">
    <div class="loading"><div class="spin"></div> 載入中...</div>
  </div>

</div>

<!-- FAB (manager only) -->
<button class="fab" id="fab" onclick="openCreateModal()">＋</button>

<!-- ── PIN MODAL ── -->
<div class="modal-bg" id="pinModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🔐 Manager Login</div>
    <div class="modal-sub">請輸入4位管理員密碼</div>
    <div class="pin-dots">
      <div class="pdot" id="pd0"></div><div class="pdot" id="pd1"></div>
      <div class="pdot" id="pd2"></div><div class="pdot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pkey" onclick="pk('1')">1</button><button class="pkey" onclick="pk('2')">2</button><button class="pkey" onclick="pk('3')">3</button>
      <button class="pkey" onclick="pk('4')">4</button><button class="pkey" onclick="pk('5')">5</button><button class="pkey" onclick="pk('6')">6</button>
      <button class="pkey" onclick="pk('7')">7</button><button class="pkey" onclick="pk('8')">8</button><button class="pkey" onclick="pk('9')">9</button>
      <button class="pkey del" onclick="pk('clr')">清除</button>
      <button class="pkey" onclick="pk('0')">0</button>
      <button class="pkey del" onclick="pk('del')">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ── CREATE EVENT MODAL ── -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <div class="modal-handle" onclick="closeCreateModal()"></div>
    <div class="modal-scroll">
      <div class="modal-title" id="createModalTitle">➕ 新增賽事</div>
      <div class="modal-sub" id="createModalSub">填寫比賽詳情</div>

      <div class="field"><label>🏟 賽事名稱</label><input type="text" id="evTitle" placeholder="e.g. 五人賽 / 友賽"></div>
      <div class="two-col">
        <div class="field"><label>📅 日期</label><input type="date" id="evDate"></div>
        <div class="field"><label>⏰ 開始時間</label><input type="time" id="evTimeStart"></div>
      </div>
      <div class="two-col">
        <div class="field"><label>⏰ 結束時間</label><input type="time" id="evTimeEnd"></div>
        <div class="field"><label>👥 正選人數</label><input type="number" id="evCap" value="14" min="5" max="30"></div>
      </div>
      <div class="field"><label>📍 地點</label><input type="text" id="evVenue" placeholder="e.g. 蒲崗村道 #1"></div>
      <div class="field"><label>🆚 對手</label><input type="text" id="evOpponent" placeholder="e.g. 別隊"></div>
      <div class="field"><label>💰 費用</label><input type="text" id="evFee" placeholder="e.g. $35 / 人"></div>
      <div class="field"><label>📝 備註（可選）</label><textarea id="evNotes" rows="2" placeholder="例如：帶白波衫..."></textarea></div>

      <div class="field"><label>👕 球衣顏色</label></div>
      <div class="color-picker" id="colorPicker"></div>

      <button class="submit-btn" id="createSubmitBtn" onclick="submitEvent()">建立賽事</button>
      <div style="height:10px"></div>
      <button id="deleteEventBtn" onclick="deleteEvent()" style="display:none;width:100%;padding:13px;border-radius:10px;border:1.5px solid var(--notgoing);background:transparent;color:#f06962;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;margin-top:6px;">🗑 刪除此賽事</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE CONFIG (replace with yours) ──────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAyLmh84JDr5ddjOnYYqgcJsupHJaZ-kig",
  authDomain: "hangfc-rvsp.firebaseapp.com",
  projectId: "hangfc-rvsp",
  storageBucket: "hangfc-rvsp.firebasestorage.app",
  messagingSenderId: "477710217351",
  appId: "1:477710217351:web:20badc5d8f88aa34404822"
};

// ── CONSTANTS ────────────────────────────────────────────────────
const TEAM_NAME = '恆友 FC';
const SHIRT_COLORS = ['#e0e0e0','#212121','#1565c0','#c62828','#2e7d32','#f9a825','#6a1b9a','#00838f','#ff6f00'];
let selectedColor = SHIRT_COLORS[0];
let mgrMode = false;
let mPin = localStorage.getItem('fc_pin') || '1234';
let pinBuf = '';
let viewYear, viewMonth;
let allEvents = [];
let editingEventId = null;

// ── INIT ─────────────────────────────────────────────────────────
const now = new Date();
viewYear  = now.getFullYear();
viewMonth = now.getMonth();
document.getElementById('teamLabel').textContent = TEAM_NAME;
buildColorPicker();
loadEvents();

// ── FIREBASE EVENTS ──────────────────────────────────────────────
function loadEvents() {
  const q = query(collection(db, 'events'), orderBy('dateTs', 'asc'));
  onSnapshot(q, snap => {
    allEvents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCalendar();
    renderEventList();
  }, err => {
    console.error(err);
    document.getElementById('eventsList').innerHTML =
      `<div class="empty-state"><div class="ei">⚠️</div><p>無法載入賽事，請確認 Firebase 設定</p></div>`;
  });
}

// ── CALENDAR ─────────────────────────────────────────────────────
function renderCalendar() {
  const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calTitle').textContent = `${viewYear}年 ${MONTHS_ZH[viewMonth]}`;
  document.getElementById('listTitle').textContent = `${MONTHS_ZH[viewMonth]} 賽程`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayStr = fmtDate(now);

  // Events this month
  const monthEvents = {};
  allEvents.forEach(ev => {
    const d = ev.date; // "YYYY-MM-DD"
    const [y, m] = d.split('-').map(Number);
    if (y === viewYear && m-1 === viewMonth) {
      monthEvents[d] = ev;
    }
  });

  let html = '';
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const isSun = (firstDay + d - 1) % 7 === 0;
    const isPast = dateStr < todayStr;
    const ev = monthEvents[dateStr];
    let cls = 'cal-day';
    if (isSun) cls += ' sun-col';
    if (isToday) cls += ' today';
    if (isPast && !isToday) cls += ' past';
    if (ev) cls += ' has-event';
    const onclick = ev ? `onclick="goEvent('${ev.id}')"` : '';
    html += `<div class="${cls}" ${onclick}>
      <span class="dn">${d}</span>
      ${ev ? '<div class="event-dot"></div>' : ''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

// ── EVENT LIST ───────────────────────────────────────────────────
function renderEventList() {
  const monthEvents = allEvents.filter(ev => {
    const [y, m] = ev.date.split('-').map(Number);
    return y === viewYear && m-1 === viewMonth;
  });

  const el = document.getElementById('eventsList');
  if (monthEvents.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ei">📅</div><p>本月暫無賽事</p></div>`;
    return;
  }

  el.innerHTML = monthEvents.map(ev => eventCard(ev)).join('');
}

function eventCard(ev) {
  const cap = ev.capacity || 14;
  const mainCount = ev.mainCount || 0;
  const pct = Math.min(mainCount/cap*100, 100);
  const isFull = mainCount >= cap;
  const isPast = ev.date < fmtDate(now);
  const [,mm,dd] = ev.date.split('-');
  const fillCls = pct >= 100 ? 'full' : pct >= 75 ? 'nearly' : '';
  let statusBadge = isPast
    ? `<span class="ec-status-badge past">已完場</span>`
    : isFull
    ? `<span class="ec-status-badge full">爆滿</span>`
    : `<span class="ec-status-badge open">報名中</span>`;

  const editBtn = mgrMode
    ? `<button onclick="openEditModal('${ev.id}',event)" style="background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);color:var(--accent);padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;margin-left:8px;">✏️ 編輯</button>` : '';

  return `<div class="event-card${isPast?' past':isFull?' full':''}" onclick="goEvent('${ev.id}')">
    <div class="ec-top">
      <div class="ec-date-block">
        <div class="ec-day">${dd}</div>
        <div class="ec-month">${mm}月 ${getDayName(ev.date)}</div>
      </div>
      <div style="display:flex;align-items:center">${statusBadge}${editBtn}</div>
    </div>
    <div class="ec-title">${esc(ev.title||'友賽')}</div>
    <div class="ec-details">
      <span class="ec-detail">⏰ ${ev.timeStart||''}${ev.timeEnd?' – '+ev.timeEnd:''}</span>
      <span class="ec-detail">📍 ${esc(ev.venue||'')}</span>
      ${ev.opponent?`<span class="ec-detail">🆚 ${esc(ev.opponent)}</span>`:''}
      ${ev.fee?`<span class="ec-detail">💰 ${esc(ev.fee)}</span>`:''}
    </div>
    <div class="ec-footer">
      <span class="ec-slots">${mainCount}/${cap}</span>
      <div class="ec-slot-bar"><div class="ec-slot-fill ${fillCls}" style="width:${pct}%"></div></div>
      <span class="ec-arrow">›</span>
    </div>
  </div>`;
}

function goEvent(id) { window.location.href = `event.html?id=${id}`; }

// ── MONTH NAV ────────────────────────────────────────────────────
window.shiftMonth = (d) => {
  viewMonth += d;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
  renderEventList();
};

// ── PIN ──────────────────────────────────────────────────────────
window.openPinModal = () => {
  if (mgrMode) { logoutMgr(); return; }
  pinBuf = '';
  for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pdot';
  document.getElementById('pinErr').textContent = '';
  document.getElementById('pinModal').classList.add('show');
};

window.pk = (v) => {
  if (v==='clr') pinBuf='';
  else if (v==='del') pinBuf=pinBuf.slice(0,-1);
  else if (pinBuf.length<4) pinBuf+=v;
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    d.className='pdot'+(i<pinBuf.length?' on':'');
  }
  document.getElementById('pinErr').textContent='';
  if(pinBuf.length===4) setTimeout(checkPin,150);
};

function checkPin() {
  if (pinBuf === mPin) {
    mgrMode = true;
    document.getElementById('pinModal').classList.remove('show');
    document.getElementById('mgrToggle').classList.add('active');
    document.getElementById('mgrToggle').textContent = '🔓 登出';
    document.getElementById('fab').classList.add('visible');
    renderEventList();
    toast('🔓 歡迎，Manager！');
  } else {
    for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pdot err';
    document.getElementById('pinErr').textContent='密碼錯誤，請重試';
    pinBuf='';
    setTimeout(()=>{for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pdot';},700);
  }
}

function logoutMgr() {
  mgrMode=false;
  document.getElementById('mgrToggle').classList.remove('active');
  document.getElementById('mgrToggle').textContent='⚙️ 管理員';
  document.getElementById('fab').classList.remove('visible');
  renderEventList();
  toast('🔒 已登出管理員');
}

// Close pin modal on bg click
document.getElementById('pinModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pinModal'))
    document.getElementById('pinModal').classList.remove('show');
});

// ── CREATE / EDIT EVENT ──────────────────────────────────────────
window.openCreateModal = () => {
  editingEventId = null;
  document.getElementById('createModalTitle').textContent = '➕ 新增賽事';
  document.getElementById('createModalSub').textContent   = '填寫比賽詳情';
  document.getElementById('createSubmitBtn').textContent  = '建立賽事';
  document.getElementById('deleteEventBtn').style.display = 'none';
  // Reset fields
  ['evTitle','evDate','evTimeStart','evTimeEnd','evVenue','evOpponent','evFee','evNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('evCap').value = 14;
  selectedColor = SHIRT_COLORS[0];
  updateColorPicker();
  document.getElementById('createModal').classList.add('show');
};

window.openEditModal = async (id, e) => {
  e.stopPropagation();
  editingEventId = id;
  const ev = allEvents.find(x=>x.id===id);
  if (!ev) return;
  document.getElementById('createModalTitle').textContent = '✏️ 編輯賽事';
  document.getElementById('createModalSub').textContent   = '更新比賽詳情';
  document.getElementById('createSubmitBtn').textContent  = '更新賽事';
  document.getElementById('deleteEventBtn').style.display = 'block';
  document.getElementById('evTitle').value     = ev.title     || '';
  document.getElementById('evDate').value      = ev.date      || '';
  document.getElementById('evTimeStart').value = ev.timeStart || '';
  document.getElementById('evTimeEnd').value   = ev.timeEnd   || '';
  document.getElementById('evCap').value       = ev.capacity  || 14;
  document.getElementById('evVenue').value     = ev.venue     || '';
  document.getElementById('evOpponent').value  = ev.opponent  || '';
  document.getElementById('evFee').value       = ev.fee       || '';
  document.getElementById('evNotes').value     = ev.notes     || '';
  selectedColor = ev.shirtColor || SHIRT_COLORS[0];
  updateColorPicker();
  document.getElementById('createModal').classList.add('show');
};

window.closeCreateModal = () => document.getElementById('createModal').classList.remove('show');
document.getElementById('createModal').addEventListener('click', e => {
  if (e.target === document.getElementById('createModal')) closeCreateModal();
});

window.submitEvent = async () => {
  const title     = document.getElementById('evTitle').value.trim();
  const date      = document.getElementById('evDate').value;
  const timeStart = document.getElementById('evTimeStart').value;
  const timeEnd   = document.getElementById('evTimeEnd').value;
  const cap       = parseInt(document.getElementById('evCap').value) || 14;
  const venue     = document.getElementById('evVenue').value.trim();
  const opponent  = document.getElementById('evOpponent').value.trim();
  const fee       = document.getElementById('evFee').value.trim();
  const notes     = document.getElementById('evNotes').value.trim();

  if (!date)  { toast('請選擇日期', 'err'); return; }
  if (!title) { toast('請填寫賽事名稱', 'err'); return; }

  const data = { title, date, dateTs: new Date(date).getTime(), timeStart, timeEnd, capacity: cap, venue, opponent, fee, notes, shirtColor: selectedColor, mainCount: 0 };

  try {
    const btn = document.getElementById('createSubmitBtn');
    btn.textContent = '儲存中...';
    if (editingEventId) {
      // preserve mainCount
      const existing = allEvents.find(x=>x.id===editingEventId);
      data.mainCount = existing?.mainCount || 0;
      await updateDoc(doc(db,'events',editingEventId), data);
      toast('✅ 賽事已更新！');
    } else {
      await addDoc(collection(db,'events'), data);
      toast('🎉 賽事已建立！');
    }
    closeCreateModal();
  } catch(err) {
    console.error(err);
    toast('儲存失敗，請重試', 'err');
  }
  document.getElementById('createSubmitBtn').textContent = editingEventId ? '更新賽事' : '建立賽事';
};

window.deleteEvent = async () => {
  if (!editingEventId) return;
  if (!confirm('確定刪除此賽事？所有登記將一併刪除。')) return;
  try {
    await deleteDoc(doc(db,'events',editingEventId));
    closeCreateModal();
    toast('🗑 賽事已刪除');
  } catch(e) { toast('刪除失敗','err'); }
};

// ── COLOR PICKER ─────────────────────────────────────────────────
function buildColorPicker() {
  document.getElementById('colorPicker').innerHTML = SHIRT_COLORS.map(c =>
    `<div class="color-opt${c===selectedColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function updateColorPicker() {
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('sel', el.style.background === hexToRgb(selectedColor) || el.style.background === selectedColor);
  });
}
window.pickColor = (c) => {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('sel'));
  event.target.classList.add('sel');
};

// ── UTILS ────────────────────────────────────────────────────────
const DAYS_ZH = ['日','一','二','三','四','五','六'];
function getDayName(dateStr) { return '（'+DAYS_ZH[new Date(dateStr).getDay()]+'）'; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hexToRgb(hex) { return hex; }

function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
</body>
</html>
