<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>恆友 FC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --surface2: #f5f5f5;
  --border: #efefef;
  --border2: #dbdbdb;
  --text: #111111;
  --sub: #737373;
  --sub2: #a8a8a8;
  --green: #22c55e;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --blue: #3b82f6;
  --blue-bg: #eff6ff;
  --orange: #f97316;
  --orange-bg: #fff7ed;
  --orange-border: #fed7aa;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --accent: #111111;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Manrope', 'Noto Sans HK', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.wrap { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

/* ── TOP NAV (Instagram-style) ── */
.topnav {
  position: sticky; top: 0; z-index: 20;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo { display: flex; align-items: center; gap: 8px; }
.nav-ball { font-size: 22px; }
.nav-brand { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; transition: background .15s;
}
.icon-btn:active { background: var(--surface2); }
.icon-btn.active { background: var(--text); border-color: var(--text); color: #fff; font-size: 14px; }

/* ── STORIES-STYLE FILTER ── */
.filter-row {
  display: flex; gap: 8px; padding: 12px 16px 4px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 100px;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  font-size: 13px; font-weight: 600;
  color: var(--sub); cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.chip.active { background: var(--text); border-color: var(--text); color: #fff; }

/* ── LIST HEADER ── */
.list-header { padding: 10px 16px 6px; display: flex; align-items: center; justify-content: space-between; }
.list-heading { font-size: 15px; font-weight: 700; color: var(--text); }
.list-count { font-size: 13px; color: var(--sub2); font-weight: 500; }

/* ── EVENT CARDS (Instagram post style) ── */
.feed { display: flex; flex-direction: column; gap: 0; }

.event-card {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  overflow: hidden;
}
.event-card:active { background: var(--surface2); }

/* Card header: avatar-date block like IG post header */
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 0;
}
.card-avatar-block { display: flex; align-items: center; gap: 10px; }
.card-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  flex-shrink: 0; position: relative;
}
.card-avatar-ring {
  position: absolute; inset: -2px; border-radius: 50%;
  border: 2px solid transparent;
}
.card-avatar-ring.open { border-color: var(--green); }
.card-avatar-ring.full { border-color: var(--orange); }
.card-avatar-ring.past { border-color: var(--border2); }

.card-meta { display: flex; flex-direction: column; gap: 1px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); }
.card-subtitle { font-size: 12px; color: var(--sub); font-weight: 500; }

.card-badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 100px; white-space: nowrap;
}
.card-badge.open { background: var(--green-bg); color: var(--green); }
.card-badge.full { background: var(--orange-bg); color: var(--orange); }
.card-badge.past { background: var(--surface2); color: var(--sub2); }

/* Card image/visual banner */
.card-banner {
  margin: 10px 16px;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  height: 110px;
  display: flex; align-items: center;
}
.card-banner-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
.card-banner-pitch {
  position: absolute; inset: 0; opacity: 0.08;
  background-image:
    linear-gradient(#fff 1px, transparent 1px),
    linear-gradient(90deg, #fff 1px, transparent 1px);
  background-size: 40px 40px;
}
.card-banner-content {
  position: relative; z-index: 1;
  padding: 0 16px;
  display: flex; align-items: center; gap: 16px; width: 100%;
}
.card-date-big {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(255,255,255,0.12);
  border-radius: 10px; padding: 8px 14px; min-width: 56px;
}
.card-day { font-size: 30px; font-weight: 800; color: #fff; line-height: 1; }
.card-month { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.card-info { flex: 1; }
.card-ev-name { font-size: 17px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 4px; }
.card-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.card-chip-sm {
  font-size: 10px; color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.1);
  border-radius: 6px; padding: 2px 7px; font-weight: 600;
}
.card-shirt-swatch {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
}

/* Card actions (IG-like row) */
.card-actions {
  padding: 8px 16px 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-slots { display: flex; align-items: center; gap: 8px; }
.slot-avatars { display: flex; }
.slot-av {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; margin-left: -6px; color: #fff;
}
.slot-av:first-child { margin-left: 0; }
.slot-text { font-size: 12px; font-weight: 700; color: var(--text); }
.slot-sub  { font-size: 12px; color: var(--sub); font-weight: 500; }

.card-progress { flex: 1; margin: 0 12px; }
.prog-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width .5s; }
.prog-fill.low  { background: var(--green); }
.prog-fill.mid  { background: var(--orange); }
.prog-fill.high { background: var(--red); }

.card-arrow { color: var(--sub2); font-size: 18px; font-weight: 300; }

/* Edit button (manager) */
.card-edit-row { padding: 0 16px 10px; display: flex; gap: 6px; }
.card-edit-btn {
  font-size: 12px; font-weight: 600; padding: 5px 12px;
  border-radius: 8px; border: 1.5px solid var(--border2);
  background: var(--surface); color: var(--sub);
  cursor: pointer;
}
.no-edit-row { padding-bottom: 12px; }

/* EMPTY / LOADING */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 52px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--sub); line-height: 1.5; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 10px; color: var(--sub); font-size: 13px; }
.spin { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 28px; right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--text); border: none;
  font-size: 24px; color: #fff;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  z-index: 40; display: none; align-items: center; justify-content: center;
  transition: transform .15s;
}
.fab.show { display: flex; }
.fab:active { transform: scale(0.93); }

/* ── MODALS ── */
.modal-bg {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 20px 20px 44px; width: 100%; max-width: 480px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,1.2,.64,1);
  max-height: 92vh; overflow-y: auto;
}
.modal-bg.show .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; cursor: pointer; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--sub); margin-bottom: 22px; }

/* PIN */
.pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 24px; }
.pdot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border2); transition: all .2s; }
.pdot.on { background: var(--text); border-color: var(--text); }
.pdot.err { background: var(--red); border-color: var(--red); animation: shk .35s; }
@keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
.pkey {
  padding: 16px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text); font-family: 'Manrope', sans-serif;
  font-size: 20px; font-weight: 700;
  cursor: pointer; transition: all .15s; user-select: none;
}
.pkey:active { background: var(--border2); transform: scale(0.93); }
.pkey.del { font-size: 13px; font-weight: 600; color: var(--sub); }
.pin-err { font-size: 13px; color: var(--red); text-align: center; margin-top: 12px; min-height: 20px; font-weight: 600; }

/* FORM */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: 0.3px; text-transform: uppercase; }
.field input, .field textarea {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 14px;
  color: var(--text); font-family: 'Manrope', 'Noto Sans HK', sans-serif;
  font-size: 15px; font-weight: 500; outline: none;
  -webkit-appearance: none; width: 100%;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus { border-color: var(--text); background: var(--surface); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.submit-btn {
  width: 100%; padding: 15px; border-radius: var(--radius);
  border: none; background: var(--text); color: #fff;
  font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.3px; margin-top: 4px;
  transition: opacity .15s;
}
.submit-btn:active { opacity: 0.85; }
.delete-btn {
  width: 100%; padding: 13px; border-radius: var(--radius);
  border: 1.5px solid #fecaca; background: var(--red-bg);
  color: var(--red); font-family: 'Manrope', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; display: none;
}
.color-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.color-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: all .15s; }
.color-opt.sel { border-color: var(--text); transform: scale(1.2); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff;
  padding: 12px 22px; border-radius: 100px;
  font-size: 13px; font-weight: 700; z-index: 200;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none; white-space: nowrap; max-width: 90vw;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP NAV -->
  <div class="topnav">
    <div class="nav-logo">
      <span class="nav-ball">⚽</span>
      <span class="nav-brand">恆友 FC</span>
    </div>
    <div class="nav-right">
      <div class="icon-btn" id="mgrBtn" onclick="openPinModal()" title="管理員">⚙️</div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-row">
    <div class="chip active" onclick="setFilter('upcoming',this)">即將舉行</div>
    <div class="chip" onclick="setFilter('all',this)">全部賽事</div>
    <div class="chip" onclick="setFilter('past',this)">已完場</div>
  </div>

  <!-- LIST HEADER -->
  <div class="list-header">
    <span class="list-heading" id="listTitle">即將舉行</span>
    <span class="list-count" id="listCount"></span>
  </div>

  <!-- FEED -->
  <div class="feed" id="feed">
    <div class="loading"><div class="spin"></div> 載入中...</div>
  </div>

</div>

<button class="fab" id="fab" onclick="openCreateModal()">＋</button>

<!-- PIN MODAL -->
<div class="modal-bg" id="pinModal">
  <div class="modal">
    <div class="modal-handle" onclick="closePinModal()"></div>
    <div class="modal-title">管理員登入</div>
    <div class="modal-sub">請輸入4位管理員密碼</div>
    <div class="pin-dots">
      <div class="pdot" id="pd0"></div><div class="pdot" id="pd1"></div>
      <div class="pdot" id="pd2"></div><div class="pdot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pkey" onclick="pk('1')">1</button><button class="pkey" onclick="pk('2')">2</button><button class="pkey" onclick="pk('3')">3</button>
      <button class="pkey" onclick="pk('4')">4</button><button class="pkey" onclick="pk('5')">5</button><button class="pkey" onclick="pk('6')">6</button>
      <button class="pkey" onclick="pk('7')">7</button><button class="pkey" onclick="pk('8')">8</button><button class="pkey" onclick="pk('9')">9</button>
      <button class="pkey del" onclick="pk('clr')">清除</button>
      <button class="pkey" onclick="pk('0')">0</button>
      <button class="pkey del" onclick="pk('del')">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- CREATE / EDIT MODAL -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <div class="modal-handle" onclick="closeCreateModal()"></div>
    <div class="modal-title" id="createTitle">新增賽事</div>
    <div class="modal-sub">填寫比賽詳情</div>
    <div class="field"><label>賽事名稱</label><input type="text" id="evTitle" placeholder="五人賽 / 友賽"></div>
    <div class="two-col">
      <div class="field"><label>日期</label><input type="date" id="evDate"></div>
      <div class="field"><label>開始時間</label><input type="time" id="evStart"></div>
    </div>
    <div class="two-col">
      <div class="field"><label>結束時間</label><input type="time" id="evEnd"></div>
      <div class="field"><label>人數上限</label><input type="number" id="evCap" value="14" min="5" max="30"></div>
    </div>
    <div class="field"><label>地點</label><input type="text" id="evVenue" placeholder="蒲崗村道 #1"></div>
    <div class="field"><label>對手</label><input type="text" id="evOpponent" placeholder="別隊"></div>
    <div class="field"><label>費用</label><input type="text" id="evFee" placeholder="$35 / 人"></div>
    <div class="field"><label>備註</label><textarea id="evNotes" rows="2" placeholder="帶白波衫..."></textarea></div>
    <div class="field"><label>球衣顏色</label></div>
    <div class="color-picker" id="colorPicker"></div>
    <button class="submit-btn" id="createBtn" onclick="submitEvent()">建立賽事</button>
    <button class="delete-btn" id="deleteBtn" onclick="deleteEvent()">刪除此賽事</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAyLmh84JDr5ddjOnYYqgcJsupHJaZ-kig",
  authDomain: "hangfc-rvsp.firebaseapp.com",
  projectId: "hangfc-rvsp",
  storageBucket: "hangfc-rvsp.appspot.com",
  messagingSenderId: "477710217351",
  appId: "1:477710217351:web:20badc5d8f88aa34404822"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var SHIRT_COLORS = ['#e0e0e0','#1a1a1a','#1565c0','#c62828','#2e7d32','#f9a825','#6a1b9a','#00838f','#ff6f00','#37474f'];
var DAYS_ZH  = ['日','一','二','三','四','五','六'];
var MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var AVATAR_COLORS = ['#f43f5e','#8b5cf6','#3b82f6','#10b981','#f59e0b','#06b6d4','#ec4899','#14b8a6'];

var mPin = '6088', mgrMode = false, pinBuf = '', editingId = null, selColor = SHIRT_COLORS[0];
var allEvents = [], curFilter = 'upcoming';

buildColorPicker();
loadEvents();

function loadEvents() {
  db.collection('events').orderBy('dateTs','asc').onSnapshot(function(snap) {
    allEvents = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    renderFeed();
  }, function(err) {
    document.getElementById('feed').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">載入失敗</div><div class="empty-sub">'+err.message+'</div></div>';
  });
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  var titles = {upcoming:'即將舉行', past:'已完場', all:'全部賽事'};
  document.getElementById('listTitle').textContent = titles[f];
  renderFeed();
}

function getFiltered() {
  var today = toDateStr(new Date());
  return allEvents.filter(function(ev) {
    if (!ev.date) return false;
    var isPast = ev.date < today;
    if (curFilter==='upcoming') return !isPast;
    if (curFilter==='past')     return isPast;
    return true;
  });
}

function renderFeed() {
  var list = getFiltered();
  document.getElementById('listCount').textContent = list.length ? list.length + ' 場' : '';
  var el = document.getElementById('feed');
  if (!list.length) {
    var msgs = { upcoming:'暫無即將舉行的賽事', past:'暫無已完場賽事', all:'暫無任何賽事' };
    var subs = { upcoming:'管理員登入後可新增賽事 ⚽', past:'', all:'' };
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div>'
      +'<div class="empty-title">'+msgs[curFilter]+'</div>'
      +(subs[curFilter]?'<div class="empty-sub">'+subs[curFilter]+'</div>':'')+'</div>';
    return;
  }
  el.innerHTML = list.map(function(ev){ return cardHTML(ev); }).join('');
}

function cardHTML(ev) {
  var cap = ev.capacity||14, mc = ev.mainCount||0;
  var pct = Math.min(mc/cap*100, 100);
  var today = toDateStr(new Date());
  var isPast = ev.date < today, isFull = mc >= cap;
  var parts = ev.date.split('-');
  var mm = parseInt(parts[1]), dd = parts[2];
  var dayName = DAYS_ZH[new Date(ev.date+'T00:00:00').getDay()];
  var statusCls = isPast ? 'past' : isFull ? 'full' : 'open';
  var badgeTxt  = isPast ? '已完場' : isFull ? '爆滿 🔥' : '報名中';
  var fillCls   = pct>=90?'high':pct>=60?'mid':'low';
  var initials  = (ev.title||'?').charAt(0).toUpperCase();
  var avatarBg  = AVATAR_COLORS[Math.abs(hashStr(ev.id||''))%AVATAR_COLORS.length];

  // slot mini-avatars (show up to 4 filled slots)
  var filledAvatars = '';
  for (var i=0; i<Math.min(mc,4); i++) {
    var ac = AVATAR_COLORS[i%AVATAR_COLORS.length];
    filledAvatars += '<div class="slot-av" style="background:'+ac+'"></div>';
  }

  var editPart = mgrMode
    ? '<div class="card-edit-row"><button class="card-edit-btn" onclick="openEditModal(\''+ev.id+'\',event)">✏️ 編輯賽事</button></div>'
    : '<div class="no-edit-row"></div>';

  var shirtPart = ev.shirtColor
    ? '<div class="card-shirt-swatch" style="background:'+ev.shirtColor+'"></div>' : '';

  return '<div class="event-card" onclick="goEvent(\''+ev.id+'\')">'
    // Header
    +'<div class="card-header">'
    +'<div class="card-avatar-block">'
    +'<div class="card-avatar" style="background:'+avatarBg+'22;color:'+avatarBg+'">'
    +initials
    +'<div class="card-avatar-ring '+statusCls+'"></div>'
    +'</div>'
    +'<div class="card-meta">'
    +'<div class="card-title">'+esc(ev.title||'友賽')+'</div>'
    +'<div class="card-subtitle">'+MONTHS_ZH[mm-1]+' '+dd+'日（'+dayName+'）</div>'
    +'</div></div>'
    +'<span class="card-badge '+statusCls+'">'+badgeTxt+'</span>'
    +'</div>'

    // Banner
    +'<div class="card-banner">'
    +'<div class="card-banner-bg"></div>'
    +'<div class="card-banner-pitch"></div>'
    +'<div class="card-banner-content">'
    +'<div class="card-date-big">'
    +'<div class="card-day">'+dd+'</div>'
    +'<div class="card-month">'+MONTHS_ZH[mm-1]+'</div>'
    +'</div>'
    +'<div class="card-info">'
    +'<div class="card-ev-name">'+esc(ev.title||'友賽')+'</div>'
    +'<div class="card-chips">'
    +(ev.timeStart?'<span class="card-chip-sm">⏰ '+ev.timeStart+(ev.timeEnd?' – '+ev.timeEnd:'')+'</span>':'')
    +(ev.venue?'<span class="card-chip-sm">📍 '+esc(ev.venue)+'</span>':'')
    +(ev.opponent?'<span class="card-chip-sm">🆚 '+esc(ev.opponent)+'</span>':'')
    +'</div></div>'
    +shirtPart
    +'</div></div>'

    // Actions
    +'<div class="card-actions">'
    +'<div class="card-slots">'
    +'<div class="slot-avatars">'+filledAvatars+'</div>'
    +'<span class="slot-text">&nbsp;'+mc+'</span>'
    +'<span class="slot-sub">&nbsp;/ '+cap+' 人</span>'
    +'</div>'
    +'<div class="card-progress"><div class="prog-track"><div class="prog-fill '+fillCls+'" style="width:'+pct+'%"></div></div></div>'
    +'<span class="card-arrow">›</span>'
    +'</div>'
    +editPart
    +'</div>';
}

function goEvent(id) { window.location.href = 'event.html?id='+id; }

// ── PIN ───────────────────────────────────────────────────────────
function openPinModal() {
  if (mgrMode) { logoutMgr(); return; }
  pinBuf='';
  for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pdot';
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinModal').classList.add('show');
}
function closePinModal() { document.getElementById('pinModal').classList.remove('show'); }
function pk(v) {
  if(v==='clr') pinBuf='';
  else if(v==='del') pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<4) pinBuf+=v;
  for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pdot'+(i<pinBuf.length?' on':'');
  document.getElementById('pinErr').textContent='';
  if(pinBuf.length===4) setTimeout(checkPin,150);
}
function checkPin() {
  if(pinBuf===mPin) {
    mgrMode=true; closePinModal();
    var btn=document.getElementById('mgrBtn');
    btn.classList.add('active'); btn.textContent='✓';
    document.getElementById('fab').classList.add('show');
    renderFeed(); toast('歡迎回來，Manager 👋');
  } else {
    for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pdot err';
    document.getElementById('pinErr').textContent='密碼錯誤，請重試';
    pinBuf='';
    setTimeout(function(){ for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pdot'; },700);
  }
}
function logoutMgr() {
  mgrMode=false;
  var btn=document.getElementById('mgrBtn');
  btn.classList.remove('active'); btn.textContent='⚙️';
  document.getElementById('fab').classList.remove('show');
  renderFeed(); toast('已登出管理員');
}
document.getElementById('pinModal').addEventListener('click',function(e){ if(e.target===this) closePinModal(); });

// ── CREATE / EDIT ─────────────────────────────────────────────────
function openCreateModal() {
  editingId=null;
  document.getElementById('createTitle').textContent='新增賽事';
  document.getElementById('createBtn').textContent='建立賽事';
  document.getElementById('deleteBtn').style.display='none';
  ['evTitle','evDate','evStart','evEnd','evVenue','evOpponent','evFee','evNotes'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('evCap').value=14;
  selColor=SHIRT_COLORS[0]; updateColorPicker();
  document.getElementById('createModal').classList.add('show');
}
function openEditModal(id, e) {
  e.stopPropagation();
  var ev=allEvents.find(function(x){return x.id===id;});
  if(!ev) return;
  editingId=id;
  document.getElementById('createTitle').textContent='編輯賽事';
  document.getElementById('createBtn').textContent='更新賽事';
  document.getElementById('deleteBtn').style.display='block';
  document.getElementById('evTitle').value    = ev.title||'';
  document.getElementById('evDate').value     = ev.date||'';
  document.getElementById('evStart').value    = ev.timeStart||'';
  document.getElementById('evEnd').value      = ev.timeEnd||'';
  document.getElementById('evCap').value      = ev.capacity||14;
  document.getElementById('evVenue').value    = ev.venue||'';
  document.getElementById('evOpponent').value = ev.opponent||'';
  document.getElementById('evFee').value      = ev.fee||'';
  document.getElementById('evNotes').value    = ev.notes||'';
  selColor=ev.shirtColor||SHIRT_COLORS[0]; updateColorPicker();
  document.getElementById('createModal').classList.add('show');
}
function closeCreateModal() { document.getElementById('createModal').classList.remove('show'); }
document.getElementById('createModal').addEventListener('click',function(e){ if(e.target===this) closeCreateModal(); });

function submitEvent() {
  var title=document.getElementById('evTitle').value.trim();
  var date =document.getElementById('evDate').value;
  if(!date)  { toast('請選擇日期','err'); return; }
  if(!title) { toast('請填寫賽事名稱','err'); return; }
  var btn=document.getElementById('createBtn'); btn.textContent='儲存中...';
  var data={title:title,date:date,dateTs:new Date(date).getTime(),
    timeStart:document.getElementById('evStart').value,
    timeEnd:  document.getElementById('evEnd').value,
    capacity: parseInt(document.getElementById('evCap').value)||14,
    venue:    document.getElementById('evVenue').value.trim(),
    opponent: document.getElementById('evOpponent').value.trim(),
    fee:      document.getElementById('evFee').value.trim(),
    notes:    document.getElementById('evNotes').value.trim(),
    shirtColor:selColor};
  var p=editingId
    ? db.collection('events').doc(editingId).update(data)
    : db.collection('events').add(Object.assign({mainCount:0},data));
  p.then(function(){ closeCreateModal(); toast(editingId?'賽事已更新 ✅':'賽事已建立 🎉'); })
   .catch(function(err){ toast('儲存失敗: '+err.message,'err'); })
   .finally(function(){ btn.textContent=editingId?'更新賽事':'建立賽事'; });
}
function deleteEvent() {
  if(!editingId||!confirm('確定刪除此賽事？')) return;
  db.collection('events').doc(editingId).delete()
    .then(function(){ closeCreateModal(); toast('賽事已刪除'); })
    .catch(function(){ toast('刪除失敗','err'); });
}

// ── COLOR PICKER ──────────────────────────────────────────────────
function buildColorPicker() {
  document.getElementById('colorPicker').innerHTML = SHIRT_COLORS.map(function(c){
    return '<div class="color-opt'+(c===selColor?' sel':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\',this)"></div>';
  }).join('');
}
function updateColorPicker() {
  document.querySelectorAll('.color-opt').forEach(function(el){
    el.classList.toggle('sel', el.getAttribute('style').indexOf(selColor)>=0);
  });
}
function pickColor(c,el) {
  selColor=c;
  document.querySelectorAll('.color-opt').forEach(function(e){e.classList.remove('sel');});
  el.classList.add('sel');
}

// ── UTILS ─────────────────────────────────────────────────────────
function toDateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hashStr(s){ var h=0; for(var i=0;i<s.length;i++) h=((h<<5)-h)+s.charCodeAt(i); return h; }
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2600);
}
</script>
